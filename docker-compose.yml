# docker-compose.yml — bancos locais do NVIDIA Startup AI Radar (Bloco 0)
# Sobe PostgreSQL (dados estruturados) e Qdrant (banco vetorial do RAG).
# As variáveis vêm do arquivo .env (copie de .env.example e preencha).
#
#   docker compose up -d      # sobe os dois bancos em background
#   docker compose ps         # mostra o status
#   docker compose down       # para os containers (os dados persistem nos volumes)

services:
  postgres:
    image: postgres:16
    container_name: radar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    # versão fixada para reprodutibilidade — ajustável se a tag não existir
    image: qdrant/qdrant:v1.12.4
    container_name: radar-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP / REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  pgdata:
  qdrant_storage:
